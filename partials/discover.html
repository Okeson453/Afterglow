<div class="view active" id="view-discover">
  <div class="deck" id="deck"></div>
  <div class="swipe-actions">
    <button class="round-btn rewind" onclick="rewindCard()" title="Rewind">↺</button>
    <button class="round-btn pass" onclick="swipeTop('pass')" title="Pass">✕</button>
    <button class="round-btn super" onclick="swipeTop('super')" title="Super Like">★</button>
    <button class="round-btn like" onclick="swipeTop('like')" title="Like">♥</button>
  </div>
  <div class="discover-suggestions">
    <div class="suggestion-head">Quick suggestions</div>
    <div class="chip-grid">
      <button class="suggestion-chip" onclick="openFilters()">Refine your filters</button>
      <button class="suggestion-chip" onclick="showView('matches')">View recent matches</button>
      <button class="suggestion-chip" onclick="openUpgradePlans()">Unlock Gold perks</button>
      <button class="suggestion-chip" onclick="editProfile()">Complete your profile</button>
    </div>
  </div>
</div>
