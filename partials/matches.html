<div class="view" id="view-matches">
  <h2 class="section-title">New Sparks</h2>
  <div class="match-strip" id="match-strip"></div>

  <h2 class="section-title" style="margin-top:22px;">Messages</h2>
  <div id="chat-list"></div>

  <div class="locked-panel" style="margin-top:26px;">
    <h2 class="section-title" style="opacity:.5;">Who Liked You</h2>
    <div style="filter:blur(1px); opacity:.4; display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">
      <div class="photo-slot filled" style="aspect-ratio:1;">😊</div>
      <div class="photo-slot filled" style="aspect-ratio:1;">😉</div>
      <div class="photo-slot filled" style="aspect-ratio:1;">😍</div>
    </div>
    <div class="lock-overlay" style="position:relative; margin-top:-90px; padding-top:10px; background:transparent; backdrop-filter:none;">
      <div class="ico">🔒</div>
      <button class="btn btn-primary btn-sm" style="width:auto;" onclick="openUpgradePlans()">Unlock with Gold</button>
    </div>
  </div>
</div>
