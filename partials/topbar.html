<div class="topbar">
  <div class="brandmark"><span class="dot"></span><span class="word">AFTER<b>GLOW</b></span></div>
  <div class="topbar-center">
    <button class="profile-pill" id="topbar-pill" onclick="toggleProfileDropdown()" title="Engagement command center">
      <span class="pill-avatar" id="topbar-avatar"><img src="../Asset/alex-azabache--Hm_xIcYbUY-unsplash.jpg" alt="profile" class="avatar-photo" /></span>
      <span class="badge-dot topbar-badge" id="topbar-badge">3</span>
    </button>
    <div class="profile-dropdown hook-panel" id="topbar-dropdown">
      <div class="hook-row">
        <button type="button" class="hook-btn" onclick="openNewFlirts(); toggleProfileDropdown()" title="New Flirts">
          <img class="hook-icon" src="../Asset/icons/3d2c4b879be94c3232a70424bf4c7e98.jpg" alt="New Flirts" />
          <span class="hook-label">New Flirts</span>
        </button>
        <button type="button" class="hook-btn" onclick="openWhoViewedMe(); toggleProfileDropdown()" title="Who Viewed Me">
          <img class="hook-icon" src="../Asset/icons/3f9470b34a8e3f526dbdb022f9f19cf7.jpg" alt="Viewed Me" />
          <span class="hook-label">Viewed Me</span>
        </button>
        <button type="button" class="hook-btn" onclick="openFreeCredits(); toggleProfileDropdown()" title="Free Credits">
          <img class="hook-icon" src="../Asset/icons/617aa451f29bf7034566ca4be190be30.jpg" alt="Free Credits" />
          <span class="hook-label">Free Credits</span>
        </button>
        <button type="button" class="hook-btn" onclick="openBoostProfile(); toggleProfileDropdown()" title="Boost Profile">
          <img class="hook-icon" src="../Asset/icons/d369ce2188a656abe7b7630d1b30c217.jpg" alt="Boost" />
          <span class="hook-label">Boost</span>
        </button>
      </div>
    </div>
  </div>
  <div class="topbar-actions">
    <button class="icon-btn" onclick="openFilters()" title="Settings"><img class="action-icon" src="../Asset/icons/3f9470b34a8e3f526dbdb022f9f19cf7.jpg" alt="Settings" /></button>
    <button class="icon-btn" onclick="showView('matches')" title="Matches">
      <img class="action-icon" src="../Asset/icons/617aa451f29bf7034566ca4be190be30.jpg" alt="Matches" /><span class="badge-dot" id="unread-badge" style="display:none">0</span>
    </button>
  </div>
</div>
