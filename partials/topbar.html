<div class="topbar">
  <div class="brandmark"><span class="dot"></span><span class="word">AFTER<b>GLOW</b></span></div>
  <div class="topbar-center">
    <button class="profile-pill" id="topbar-pill" onclick="toggleProfileDropdown()" title="Engagement command center">
      <span class="pill-avatar" id="topbar-avatar">✨</span>
      <span class="badge-dot topbar-badge" id="topbar-badge">3</span>
    </button>
    <div class="profile-dropdown hook-panel" id="topbar-dropdown">
      <div class="hook-row">
        <button type="button" class="hook-btn" onclick="openNewFlirts(); toggleProfileDropdown()" title="New Flirts">
          <span class="hook-emoji">💋</span>
          <span class="hook-label">New Flirts</span>
        </button>
        <button type="button" class="hook-btn" onclick="openWhoViewedMe(); toggleProfileDropdown()" title="Who Viewed Me">
          <span class="hook-emoji">👀</span>
          <span class="hook-label">Viewed Me</span>
        </button>
        <button type="button" class="hook-btn" onclick="openFreeCredits(); toggleProfileDropdown()" title="Free Credits">
          <span class="hook-emoji">🎁</span>
          <span class="hook-label">Free Credits</span>
        </button>
        <button type="button" class="hook-btn" onclick="openBoostProfile(); toggleProfileDropdown()" title="Boost Profile">
          <span class="hook-emoji">🚀</span>
          <span class="hook-label">Boost</span>
        </button>
      </div>
    </div>
  </div>
  <div class="topbar-actions">
    <button class="icon-btn" onclick="openFilters()" title="Settings">⚙️</button>
    <button class="icon-btn" onclick="showView('matches')" title="Matches">
      💬<span class="badge-dot" id="unread-badge" style="display:none">0</span>
    </button>
  </div>
</div>
