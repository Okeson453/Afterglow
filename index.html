<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>AFTERGLOW — Find your match</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div id="app">
  <section id="screen-auth" class="screen active">
    <div class="auth-wrap">
      <div class="auth-hero">
        <div class="brandmark"><span class="dot"></span><span class="word">AFTER<b>GLOW</b></span></div>
        <h1>MEET<br>TONIGHT.</h1>
        <p>Verified people. Real-time matches. Zero small talk required.</p>
      </div>

      <div class="card">
        <div class="tabs">
          <button id="tab-login" class="active" onclick="switchAuthTab('login')">Log In</button>
          <button id="tab-signup" onclick="switchAuthTab('signup')">Sign Up</button>
        </div>

        <!-- LOGIN -->
        <form id="form-login" onsubmit="return handleLogin(event)">
          <div class="field">
            <label>Email or phone</label>
            <input type="text" id="login-id" placeholder="you@example.com" required>
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="login-pw" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary">Enter Afterglow</button>
        </form>

        <!-- SIGNUP -->
        <form id="form-signup" style="display:none" onsubmit="return handleSignup(event)">
          <div class="field">
            <label>Email</label>
            <input type="email" id="signup-email" placeholder="you@example.com" required>
          </div>
          <div class="field">
            <label>Password</label>
            <input type="password" id="signup-pw" placeholder="8+ characters" minlength="8" required>
          </div>
          <div class="field">
            <label>Date of birth</label>
            <input type="date" id="signup-dob" required>
            <div class="error" id="dob-error">You must be 18 or older to join.</div>
          </div>
          <button type="submit" class="btn btn-primary">Create Account</button>
        </form>

        <p class="legal">By continuing you confirm you're <b>18+</b> and agree to our Community &amp; Safety Guidelines. Every profile is reviewed before it goes live.</p>
      </div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
